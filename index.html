<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <meta name="description" content="A beautiful, modern web-based Pomodoro timer designed for productivity.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <section class="timer-card" aria-label="Timer Controls">
            <div class="mode-selector" role="group" aria-label="Timer Mode">
                <button class="mode-btn active" data-mode="pomodoro" id="btn-pomodoro">Pomodoro</button>
                <button class="mode-btn" data-mode="shortBreak" id="btn-shortBreak">Short Break</button>
                <button class="mode-btn" data-mode="longBreak" id="btn-longBreak">Long Break</button>
            </div>
            
            <div class="time-display" aria-live="polite">
                <span id="minutes">25</span><span class="colon">:</span><span id="seconds">00</span>
            </div>
            
            <div class="controls">
                <button id="startBtn" class="primary-btn">Start</button>
                <button id="resetBtn" class="secondary-btn">Reset</button>
            </div>
            
            <div class="custom-time-input">
                <input type="number" id="customMinutes" min="1" max="999" placeholder="Custom min" aria-label="Custom minutes">
                <button id="setCustomBtn" class="secondary-btn small-btn">Set</button>
            </div>
        </section>
    </main>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
